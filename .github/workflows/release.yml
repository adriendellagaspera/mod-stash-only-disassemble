name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    env:
      REDSCRIPT_TAG: v1.0.0-preview.22
    steps:
      - uses: actions/checkout@v6

      # Re-validate the source parses before we package an artifact, so a
      # broken tag never ships. Same caching strategy as ci.yml.
      - name: Cache redscript-cli binary
        id: cache-bin
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/redscript-cli
          key: redscript-cli-${{ env.REDSCRIPT_TAG }}-${{ runner.os }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.cache-bin.outputs.cache-hit != 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.cache-bin.outputs.cache-hit != 'true'
        with:
          shared-key: redscript-cli-${{ env.REDSCRIPT_TAG }}

      - name: Install redscript-cli
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/jac3km4/redscript --tag ${{ env.REDSCRIPT_TAG }} --locked redscript-cli

      - name: Parse .reds sources
        run: redscript-cli format -s . >/dev/null

      # Build the exact trees a player drops into their Cyberpunk 2077 folder.
      # Two archives are produced per release:
      #   stash-only-disassemble-{version}.zip        — patch 2.0+ (default)
      #   stash-only-disassemble-{version}-legacy.zip — patch 1.x
      - name: Stage mod trees
        run: |
          version="${GITHUB_REF_NAME#v}"
          scripts_dir="r6/scripts/stashOnlyDisassemble"

          # --- 2.x archive (compat.reds = HandleStorageSlotClick) ---
          stage="dist/${scripts_dir}"
          mkdir -p "$stage"
          cp stashOnlyDisassemble.reds "$stage/"
          cp compat.reds "$stage/"
          cp LICENSE README.md dist/

          # --- 1.x legacy archive (legacy/compat.reds = HandleStorageSlotInput) ---
          stage_legacy="dist-legacy/${scripts_dir}"
          mkdir -p "$stage_legacy"
          cp stashOnlyDisassemble.reds "$stage_legacy/"
          cp legacy/compat.reds "$stage_legacy/compat.reds"
          cp LICENSE README.md dist-legacy/

          echo "version=$version" >> "$GITHUB_ENV"

      - name: Create archives
        run: |
          (cd dist       && zip -r "../stash-only-disassemble-${version}.zip" .)
          (cd dist-legacy && zip -r "../stash-only-disassemble-${version}-legacy.zip" .)

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "stash-only-disassemble-${version}.zip" \
            "stash-only-disassemble-${version}-legacy.zip" \
            --title "stash-only-disassemble ${version}" \
            --generate-notes
