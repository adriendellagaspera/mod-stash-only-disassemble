# =============================================================================
# Realistic Arsenal — facet e (loot/weapon-tier removal) — 00 quality stats
# =============================================================================
# WHAT THIS DOES
#   In patch 2.x, weapon "quality" is stat-modifier driven: a set of
#   gamedataConstantStatModifier_Record records (one per tier) carry a `value`
#   that feeds BaseStats.Quality. The Common -> Iconic ladder is just those
#   `value` numbers diverging. This file overrides every Quality.* modifier so
#   they ALL resolve to ONE neutral constant -> every tier is the same object.
#
# CONFIRMED STRUCTURE vs BEST-EFFORT NAMES
#   CONFIRMED (research spike): the *shape* — constant stat modifiers, one per
#   quality, with a numeric `value` flat, feeding BaseStats.Quality.
#   BEST-EFFORT: the exact record paths below (Quality.Common, .CommonPlus,
#   .Uncommon[Plus], .Rare[Plus], .Epic[Plus], .Legendary[Plus], .IconicItem)
#   and the flat name `value`. These CANNOT be verified without a real TweakDB
#   dump.
#
# SILENT-FAIL WARNING
#   TweakXL applies overrides by exact TweakDBID. A wrong record/flat name does
#   NOT error — it is silently ignored. If a tier still scales in game, the
#   record path here is wrong: confirm against a TweakDB dump and correct it.
#   Do not treat "file present, CI green" as "tiers flattened".
#
# UNINSTALL / KILL
#   TweakXL is non-persistent: it patches TweakDB in memory at load only.
#   Deleting this folder (r6/tweaks/realisticArsenal/) fully reverts to vanilla
#   on next launch. No save migration, no leftover state.
#
# SCOPE CEILING
#   This flattens the DATA input only. The engine RPGManager scaling SHAPE is
#   out of scope here (facet a, redscript, harness-blocked). Facet e accepts
#   the neutralised engine residual.
# =============================================================================

# Neutral constant every tier collapses to. Common's vanilla value is the
# conventional "1.0 = no scaling" anchor; the point is only that ALL tiers
# share ONE value, so the literal here is arbitrary as long as it is uniform.

Quality.Common:
  value: 1.0

Quality.CommonPlus:
  value: 1.0

Quality.Uncommon:
  value: 1.0

Quality.UncommonPlus:
  value: 1.0

Quality.Rare:
  value: 1.0

Quality.RarePlus:
  value: 1.0

Quality.Epic:
  value: 1.0

Quality.EpicPlus:
  value: 1.0

Quality.Legendary:
  value: 1.0

Quality.LegendaryPlus:
  value: 1.0

Quality.IconicItem:
  value: 1.0
